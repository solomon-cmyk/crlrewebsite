<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" width="960" height="560" viewBox="0 0 960 560">
  <defs>
    <filter id="maraveWatermarkTone" x="0" y="0" width="100%" height="100%" color-interpolation-filters="sRGB">
      <feComponentTransfer in="SourceGraphic" result="inv">
        <feFuncR type="linear" slope="-1" intercept="1"/>
        <feFuncG type="linear" slope="-1" intercept="1"/>
        <feFuncB type="linear" slope="-1" intercept="1"/>
        <feFuncA type="identity"/>
      </feComponentTransfer>
      <feColorMatrix in="inv" type="luminanceToAlpha" result="mask"/>
      <feFlood flood-color="#997861" flood-opacity="1" result="tone"/>
      <feComposite in="tone" in2="mask" operator="in"/>
    </filter>
  </defs>
  <g opacity="0.16">
    <image
      href="/Logos/MARAVE_Tagline_KO.png"
      xlink:href="/Logos/MARAVE_Tagline_KO.png"
      x="80"
      y="100"
      width="800"
      height="360"
      preserveAspectRatio="xMidYMid meet"
      filter="url(#maraveWatermarkTone)"
    />
  </g>
</svg>
